name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Convert Logo to ICO
        run: magick -background none -density 256 assets\logo.png -define icon:auto-resize="256,128,64,48,32,16" assets\logo.ico

      - name: Build release binary
        run: cargo build --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer (Inno Setup)
        run: iscc setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lekhani-latex-windows-installer
          path: Output\lekhani-latexSetup.exe
