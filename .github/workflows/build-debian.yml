name: Build Debian/Ubuntu DEB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev libfontconfig1-dev libgtk-3-dev pkg-config

      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb


      - name: Build release binary
        run: cargo build --release

      - name: Build DEB package
        run: cargo deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: lekhani-latex-debian-deb
          path: target/debian/*.deb
