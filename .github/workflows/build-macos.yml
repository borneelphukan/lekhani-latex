name: Build macOS (.dmg)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build for x86_64 (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for aarch64 (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal
          lipo -create \
            target/x86_64-apple-darwin/release/lekhani-latex \
            target/aarch64-apple-darwin/release/lekhani-latex \
            -output target/universal/lekhani-latex

      - name: Generate app icon
        run: |
          ICONSET="lekhani-latex.iconset"
          mkdir -p "$ICONSET"
          python3 assets/gen_icon.py
          iconutil -c icns "$ICONSET" -o assets/icon.icns 2>&1 || echo "Icon generation failed, continuing without icon"

      - name: Create .app bundle
        run: |
          APP_NAME="Lekhani Latex"
          APP_DIR="$APP_NAME.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp target/universal/lekhani-latex "$APP_DIR/Contents/MacOS/"
          chmod +x "$APP_DIR/Contents/MacOS/lekhani-latex"
          cp assets/Info.plist "$APP_DIR/Contents/"
          if [ -f assets/icon.icns ]; then
            cp assets/icon.icns "$APP_DIR/Contents/Resources/"
          fi
          plutil -lint "$APP_DIR/Contents/Info.plist"

      - name: Create .dmg
        run: |
          APP_NAME="Lekhani Latex"
          DMG_NAME="lekhani-latex-macos.dmg"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_NAME.app" \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lekhani-latex-macos
          path: lekhani-latex-macos.dmg
